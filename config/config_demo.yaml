env:
  env: local
  serviceName: radar
  debug: false
  log:
    pretty: true
    level: "info"

http:
  port: 4433
  maxRequestBodySize: "100KB"
  allowedHost: "" # Optional host lock (example: api.whereisvendor.com)
  cloudflareSecret: "" # Optional Cloudflare origin secret header value
  timeouts:
    readTimeout: 30s
    readHeaderTimeout: 10s
    writeTimeout: 30s
    idleTimeout: 60s

postgres:
  database: "auth_db"
  schema: "public"
  searchPath: "public,extensions"
  sslMode: "disable"
  master:
    host: "localhost"
    port: "5432"
    username: "user"
    password: "password"
    timeout: "10s"
  # replicas are configured dynamically via environment variables (POSTGRES_REPLICAS_0_HOST, POSTGRES_REPLICAS_0_PORT, etc.)
  maxIdleConns: 25
  maxOpenConns: 50
  connMaxLifetime: "5m"

secretKey:
  access: "access_secret"
  refresh: "refresh_secret"
  onboarding: ""
  linking: ""

googleOAuth:
  # Only ClientID is needed for ID token verification
  # ClientSecret and RedirectURI are not needed for client-side OAuth flows
  clientId: "demo_google_client_id"

auth:
  argon2Memory: 65536
  argon2Iterations: 3
  argon2Parallelism: 1
  argon2MaxConcurrent: 4
  maxActiveSessions: 20
  accessTokenTTL: 15m
  refreshTokenTTL: 168h
  onboardingTokenTTL: 10m
  linkingTokenTTL: 10m

loginThrottle:
  maxAttempts: 5
  lockoutDecayDays: 7

passwordStrength:
  minLength: 8
  requireUppercase: true
  requireLowercase: true
  requireNumbers: true
  requireSpecial: true
  maxLength: 128

testRoutes:
  enabled: true

locationNotification:
  userMaxLocations: 5
  merchantMaxLocations: 10
  defaultRadius: 1000.0
  maxRadius: 5000.0

notification:
  timeout: 10s

firebase:
  projectId: "demo-project-id"
  credentialsPath: "/path/to/demo-firebase-service-account.json"

qrcode:
  errorCorrectionLevel: "M"

pubsub:
  provider: "local" # "local" for development, "google" for production
  projectId: "" # Google Cloud project ID (for google provider)
  topicId: "" # Pub/Sub topic ID (for google provider)
  localEndpoint: "http://localhost:8081/push" # Local worker endpoint (for local provider)

pmtiles:
  enabled: false # Enable PMTiles-based routing for notification runtime
  source: "http://localhost:8080/map.pmtiles" # PMTiles source URL
  roadLayer: "transportation" # MVT road layer name
  zoomLevel: 14 # Zoom level for tile queries

deviceCleanup:
  timeout: 5m
