name: Deploy Cloud Run Reusable

on:
  workflow_call:
    inputs:
      environment_name:
        description: "GitHub environment name"
        required: true
        type: string
      resource_type:
        description: "Cloud Run resource type: service or job"
        required: false
        default: service
        type: string
      target:
        description: "Deploy target"
        required: true
        type: string
      image_ref:
        description: "Image tag or commit SHA to deploy"
        required: true
        type: string
      run_migration:
        description: "Run database migration before deploy"
        required: false
        default: false
        type: boolean
      run_supabase_migration:
        description: "Run Supabase-only pre/post database migrations."
        required: false
        default: false
        type: boolean
      enable_cloudflare_sync:
        description: "Sync Cloudflare transform rule after deploy"
        required: false
        default: false
        type: boolean
      configure_scheduler:
        description: "Create or update the Cloud Scheduler trigger for Cloud Run Jobs"
        required: false
        default: false
        type: boolean
      execute_now:
        description: "Execute the Cloud Run Job immediately after deploy"
        required: false
        default: false
        type: boolean
      schedule:
        description: "Cloud Scheduler cron expression for Cloud Run Jobs"
        required: false
        default: "0 3 * * *"
        type: string
      schedule_time_zone:
        description: "Cloud Scheduler time zone for Cloud Run Jobs"
        required: false
        default: "Asia/Taipei"
        type: string
      scheduler_name:
        description: "Cloud Scheduler job name for Cloud Run Jobs"
        required: false
        default: ""
        type: string

jobs:
  deploy:
    name: Deploy ${{ inputs.resource_type }} ${{ inputs.target }} to ${{ inputs.environment_name }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    permissions:
      contents: read
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      REGISTRY: ${{ vars.GCP_REGISTRY }}
      ALLOWED_HOST: ${{ vars.HTTP_ALLOWEDHOST }}
      GCP_SA_EMAIL: ${{ vars.GCP_SA_EMAIL }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLEOAUTH_CLIENTID }}
    steps:
      - name: Validate common deployment configuration
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          set -euo pipefail

          for required in PROJECT_ID REGION REGISTRY GCP_SA_EMAIL GCP_SA_KEY; do
            if [ -z "${!required:-}" ]; then
              echo "::error::Missing required deployment configuration: ${required}"
              exit 1
            fi
          done

          case "${{ inputs.resource_type }}" in
            service)
              case "${{ inputs.target }}" in
                radar|geoworker) ;;
                *)
                  echo "::error::Unsupported Cloud Run service target: ${{ inputs.target }}"
                  exit 1
                  ;;
              esac
              ;;
            job)
              case "${{ inputs.target }}" in
                device-cleanup) ;;
                *)
                  echo "::error::Unsupported Cloud Run job target: ${{ inputs.target }}"
                  exit 1
                  ;;
              esac
              ;;
            *)
              echo "::error::Unsupported resource_type: ${{ inputs.resource_type }}"
              exit 1
              ;;
          esac

      - name: Validate service deployment configuration
        if: ${{ inputs.resource_type == 'service' }}
        run: |
          set -euo pipefail

          for required in ALLOWED_HOST GOOGLE_OAUTH_CLIENT_ID; do
            if [ -z "${!required:-}" ]; then
              echo "::error::Missing required service deployment configuration: ${required}"
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main
          fetch-depth: 0

      - name: Set up Go version
        if: ${{ inputs.run_migration || inputs.run_supabase_migration }}
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Install goose
        if: ${{ inputs.run_migration || inputs.run_supabase_migration }}
        run: |
          set -euo pipefail

          go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Resolve migration database secret
        if: ${{ inputs.run_migration || inputs.run_supabase_migration }}
        id: migration_db
        run: |
          set -euo pipefail

          MIGRATION_SECRET="postgres-migration-dsn"
          if ! gcloud secrets describe "${MIGRATION_SECRET}" --project="${PROJECT_ID}" >/dev/null 2>&1; then
            MIGRATION_SECRET="postgres-master-dsn"
            echo "::warning::Secret postgres-migration-dsn was not found; falling back to postgres-master-dsn for migrations."
          fi

          PG_URI=$(gcloud secrets versions access latest --secret="${MIGRATION_SECRET}" --project="${PROJECT_ID}")
          if printf '%s' "${PG_URI}" | grep -Eq 'pooler\.supabase\.com' \
            && printf '%s' "${PG_URI}" | grep -Eq '(:6543|port=6543)([^0-9]|$)'; then
            echo "::error::Migration DSN secret ${MIGRATION_SECRET} points to the Supabase transaction pooler. Use a direct connection or Supavisor session-mode DSN for migrations."
            exit 1
          fi

          echo "secret=${MIGRATION_SECRET}" >> "${GITHUB_OUTPUT}"
          echo "Using ${MIGRATION_SECRET} for database migrations."

      - name: Run Supabase pre-migrations
        if: ${{ inputs.run_supabase_migration }}
        run: |
          set -euo pipefail

          PG_URI=$(gcloud secrets versions access latest --secret="${{ steps.migration_db.outputs.secret }}" --project="${PROJECT_ID}")
          PGOPTIONS="-c search_path=public,extensions" "$(go env GOPATH)/bin/goose" \
            -table goose_supabase_pre_version \
            -dir ./database/migration/supabase/pre \
            postgres "${PG_URI}" up

      - name: Run Database Migration
        if: ${{ inputs.run_migration }}
        run: |
          set -euo pipefail

          PG_URI=$(gcloud secrets versions access latest --secret="${{ steps.migration_db.outputs.secret }}" --project="${PROJECT_ID}")
          if [ "${{ inputs.run_supabase_migration }}" = "true" ]; then
            PGOPTIONS="-c search_path=public,extensions" "$(go env GOPATH)/bin/goose" \
              -dir ./database/migration/postgres \
              postgres "${PG_URI}" up
          else
            "$(go env GOPATH)/bin/goose" \
              -dir ./database/migration/postgres \
              postgres "${PG_URI}" up
          fi

      - name: Run Supabase post-migrations
        if: ${{ inputs.run_supabase_migration }}
        run: |
          set -euo pipefail

          PG_URI=$(gcloud secrets versions access latest --secret="${{ steps.migration_db.outputs.secret }}" --project="${PROJECT_ID}")
          PGOPTIONS="-c search_path=public,extensions" "$(go env GOPATH)/bin/goose" \
            -table goose_supabase_post_version \
            -dir ./database/migration/supabase/post \
            postgres "${PG_URI}" up

      - name: Resolve image reference
        id: image
        run: |
          set -euo pipefail

          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_REF="$(printf '%s' "${{ inputs.image_ref }}" | xargs)"
          IMAGE_TAG=""
          IMAGE_DIGEST=""
          TAG_SOURCE="manual image ref"
          TARGET_IMAGE_BASE="${REGISTRY}/${OWNER}/${{ inputs.target }}"

          if [ -z "${IMAGE_REF}" ]; then
            echo "::error::image_ref is required. Provide a deployable image tag or commit SHA."
            exit 1
          fi

          if git rev-parse --verify "${IMAGE_REF}^{commit}" >/dev/null 2>&1; then
            IMAGE_TAG="$(git rev-parse --short "${IMAGE_REF}")"
            TAG_SOURCE="commit sha input"
          else
            IMAGE_TAG="${IMAGE_REF}"
          fi

          IMAGE_NAME="${TARGET_IMAGE_BASE}:${IMAGE_TAG}"
          IMAGE_DIGEST=$(gcloud artifacts docker images describe "${IMAGE_NAME}" \
            --project="${PROJECT_ID}" \
            --format='value(image_summary.fully_qualified_digest)')

          echo "tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "digest=${IMAGE_DIGEST}" >> "${GITHUB_OUTPUT}"
          echo "source=${TAG_SOURCE}" >> "${GITHUB_OUTPUT}"

          echo "Deploy environment: ${{ inputs.environment_name }}"
          echo "Deploy target: ${{ inputs.target }}"
          echo "Requested image ref: ${IMAGE_REF}"
          echo "Resolved image tag: ${IMAGE_TAG} (${TAG_SOURCE})"
          echo "Resolved image: ${IMAGE_NAME}"
          echo "Resolved digest: ${IMAGE_DIGEST}"

      - name: Verify image exists in Artifact Registry
        run: |
          set -euo pipefail

          gcloud artifacts docker images describe "${{ steps.image.outputs.name }}" \
            --project="${PROJECT_ID}" \
            --format='value(image_summary.fully_qualified_digest)'

      - name: Prepare service YAML
        if: ${{ inputs.resource_type == 'service' }}
        env:
          CLOUDFLARE_ORIGIN_SECRET: ${{ secrets.CLOUDFLARE_ORIGIN_SECRET }}
        run: |
          set -euo pipefail

          kubectl kustomize "deploy/cloud-run/overlays/${{ inputs.environment_name }}/${{ inputs.target }}" > /tmp/service.yaml

          IMAGE_NAME_ESCAPED=$(printf '%s' "${{ steps.image.outputs.name }}" | sed -e 's/[\\/&]/\\&/g')
          SERVICE_ACCOUNT_ESCAPED=$(printf '%s' "${GCP_SA_EMAIL}" | sed -e 's/[\\/&]/\\&/g')
          PROJECT_ID_ESCAPED=$(printf '%s' "${PROJECT_ID}" | sed -e 's/[\\/&]/\\&/g')
          ALLOWED_HOST_ESCAPED=$(printf '%s' "${ALLOWED_HOST}" | sed -e 's/[\\/&]/\\&/g')
          GOOGLE_OAUTH_CLIENT_ID_ESCAPED=$(printf '%s' "${GOOGLE_OAUTH_CLIENT_ID}" | sed -e 's/[\\/&]/\\&/g')

          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE_NAME_ESCAPED}|g" /tmp/service.yaml
          sed -i "s|SERVICE_ACCOUNT_PLACEHOLDER|${SERVICE_ACCOUNT_ESCAPED}|g" /tmp/service.yaml
          sed -i "s|PROJECT_ID_PLACEHOLDER|${PROJECT_ID_ESCAPED}|g" /tmp/service.yaml
          sed -i "s|HTTP_ALLOWEDHOST_PLACEHOLDER|${ALLOWED_HOST_ESCAPED}|g" /tmp/service.yaml
          sed -i "s|GOOGLEOAUTH_CLIENTID_PLACEHOLDER|${GOOGLE_OAUTH_CLIENT_ID_ESCAPED}|g" /tmp/service.yaml

          if grep -q "HTTP_CLOUDFLARESECRET_PLACEHOLDER" /tmp/service.yaml; then
            if [ -z "${CLOUDFLARE_ORIGIN_SECRET:-}" ]; then
              echo "::error::Missing required environment secret: CLOUDFLARE_ORIGIN_SECRET"
              exit 1
            fi

            CLOUDFLARE_SECRET_ESCAPED=$(printf '%s' "${CLOUDFLARE_ORIGIN_SECRET}" | sed -e 's/[\\/&]/\\&/g')
            sed -i "s|HTTP_CLOUDFLARESECRET_PLACEHOLDER|${CLOUDFLARE_SECRET_ESCAPED}|g" /tmp/service.yaml
          fi

      - name: Deploy Cloud Run service
        if: ${{ inputs.resource_type == 'service' }}
        id: deploy
        run: |
          set -euo pipefail

          gcloud run services replace /tmp/service.yaml \
            --project="${PROJECT_ID}" \
            --region="${REGION}"

          if [ "${{ inputs.environment_name }}" = "prod" ] && [ "${{ inputs.target }}" = "radar" ]; then
            gcloud run services add-iam-policy-binding "${{ inputs.target }}" \
              --project="${PROJECT_ID}" \
              --region="${REGION}" \
              --member="allUsers" \
              --role="roles/run.invoker"
          fi

      - name: Deploy Cloud Run job
        if: ${{ inputs.resource_type == 'job' }}
        run: |
          set -euo pipefail

          case "${{ inputs.target }}" in
            device-cleanup)
              gcloud run jobs deploy "${{ inputs.target }}" \
                --image="${{ steps.image.outputs.name }}" \
                --project="${PROJECT_ID}" \
                --region="${REGION}" \
                --service-account="${GCP_SA_EMAIL}" \
                --tasks=1 \
                --parallelism=1 \
                --memory=512Mi \
                --cpu=1 \
                --task-timeout=10m \
                --set-env-vars="ENV_LOG_PRETTY=false,ENV_LOG_LEVEL=info,POSTGRES_PRESET=supabase_transaction,POSTGRES_SSLMODE=require,POSTGRES_MAXOPENCONNS=5" \
                --set-secrets="POSTGRES_MASTER_DSN=postgres-master-dsn:latest" \
                --quiet
              ;;
            *)
              echo "::error::Missing Cloud Run Job deployment configuration for target: ${{ inputs.target }}"
              exit 1
              ;;
          esac

      - name: Configure Cloud Scheduler for job
        if: ${{ inputs.resource_type == 'job' && inputs.configure_scheduler }}
        run: |
          set -euo pipefail

          SCHEDULER_JOB_NAME="${{ inputs.scheduler_name }}"
          if [ -z "${SCHEDULER_JOB_NAME}" ]; then
            echo "::error::scheduler_name is required when configure_scheduler is enabled."
            exit 1
          fi

          JOB_RUN_URI="https://run.googleapis.com/v2/projects/${PROJECT_ID}/locations/${REGION}/jobs/${{ inputs.target }}:run"

          if gcloud scheduler jobs describe "${SCHEDULER_JOB_NAME}" \
            --project="${PROJECT_ID}" \
            --location="${REGION}" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "${SCHEDULER_JOB_NAME}" \
              --project="${PROJECT_ID}" \
              --location="${REGION}" \
              --schedule="${{ inputs.schedule }}" \
              --time-zone="${{ inputs.schedule_time_zone }}" \
              --uri="${JOB_RUN_URI}" \
              --http-method=POST \
              --oauth-service-account-email="${GCP_SA_EMAIL}" \
              --oauth-token-scope="https://www.googleapis.com/auth/cloud-platform" \
              --quiet
          else
            gcloud scheduler jobs create http "${SCHEDULER_JOB_NAME}" \
              --project="${PROJECT_ID}" \
              --location="${REGION}" \
              --schedule="${{ inputs.schedule }}" \
              --time-zone="${{ inputs.schedule_time_zone }}" \
              --uri="${JOB_RUN_URI}" \
              --http-method=POST \
              --oauth-service-account-email="${GCP_SA_EMAIL}" \
              --oauth-token-scope="https://www.googleapis.com/auth/cloud-platform" \
              --quiet
          fi

      - name: Execute Cloud Run job
        if: ${{ inputs.resource_type == 'job' && inputs.execute_now }}
        run: |
          set -euo pipefail

          gcloud run jobs execute "${{ inputs.target }}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --wait

      - name: Sync Cloudflare Transform Rule Header
        if: ${{ inputs.resource_type == 'service' && inputs.enable_cloudflare_sync && inputs.target == 'radar' }}
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_RULE_ID: ${{ secrets.CLOUDFLARE_TRANSFORM_RULE_ID }}
          CF_ORIGIN_SECRET: ${{ secrets.CLOUDFLARE_ORIGIN_SECRET }}
          CF_SECRET_HEADER_NAME: X-Cloudflare-Secret
        run: |
          set -euo pipefail

          for required in CF_API_TOKEN CF_ZONE_ID CF_RULE_ID CF_ORIGIN_SECRET; do
            if [ -z "${!required:-}" ]; then
              echo "::error::Missing required environment secret: ${required}"
              exit 1
            fi
          done

          ENTRYPOINT_RESPONSE=$(curl --silent --show-error --fail \
            --request GET \
            --url "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/rulesets/phases/http_request_late_transform/entrypoint" \
            --header "Authorization: Bearer ${CF_API_TOKEN}" \
            --header "Content-Type: application/json")

          if [ "$(printf '%s' "${ENTRYPOINT_RESPONSE}" | jq -r '.success')" != "true" ]; then
            echo "::error::Failed to fetch Cloudflare transform ruleset entrypoint"
            printf '%s' "${ENTRYPOINT_RESPONSE}" | jq -c '.errors'
            exit 1
          fi

          RULESET_ID=$(printf '%s' "${ENTRYPOINT_RESPONSE}" | jq -r '.result.id // empty')
          if [ -z "${RULESET_ID}" ]; then
            echo "::error::Cloudflare transform ruleset entrypoint id not found"
            exit 1
          fi

          TARGET_RULE=$(printf '%s' "${ENTRYPOINT_RESPONSE}" | jq -c --arg rule_id "${CF_RULE_ID}" '.result.rules[] | select(.id == $rule_id)')
          if [ -z "${TARGET_RULE}" ]; then
            echo "::error::Cloudflare transform rule not found: ${CF_RULE_ID}"
            exit 1
          fi

          UPDATED_RULE=$(printf '%s' "${TARGET_RULE}" | jq -c --arg header "${CF_SECRET_HEADER_NAME}" --arg secret "${CF_ORIGIN_SECRET}" '
            .action = "rewrite"
            | .action_parameters.headers[$header] = {"operation":"set","value":$secret}
          ')

          UPDATE_RESPONSE=$(curl --silent --show-error --fail \
            --request PATCH \
            --url "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/rulesets/${RULESET_ID}/rules/${CF_RULE_ID}" \
            --header "Authorization: Bearer ${CF_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "${UPDATED_RULE}")

          if [ "$(printf '%s' "${UPDATE_RESPONSE}" | jq -r '.success')" != "true" ]; then
            echo "::error::Failed to update Cloudflare transform rule header"
            printf '%s' "${UPDATE_RESPONSE}" | jq -c '.errors'
            exit 1
          fi

      - name: Show service output
        if: ${{ inputs.resource_type == 'service' }}
        run: |
          set -euo pipefail

          gcloud run services describe "${{ inputs.target }}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --format='value(status.url)'

      - name: Show job output
        if: ${{ inputs.resource_type == 'job' }}
        run: |
          set -euo pipefail

          gcloud run jobs describe "${{ inputs.target }}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --format='yaml(name,spec.template.spec.taskCount,spec.template.spec.parallelism,spec.template.spec.template.spec.containers[0].image,status.latestCreatedExecution.name)'
