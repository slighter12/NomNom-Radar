name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - radar
          - geoworker
      image_tag:
        description: 'Optional image tag override. Leave blank to use the selected ref short SHA.'
        required: false
        default: ''
      run_migration:
        description: 'Run database migration before deploy'
        required: false
        type: boolean
        default: false

env:
  PROJECT_ID: radar-469510
  REGION: asia-east1
  REGISTRY: asia-east1-docker.pkg.dev/radar-469510/radar

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Run Database Migration
        if: ${{ inputs.run_migration }}
        run: |
          # Install goose
          go install github.com/pressly/goose/v3/cmd/goose@latest

          # Fetch database DSN from Secret Manager and run migration
          PG_URI=$(gcloud secrets versions access latest --secret="postgres-master-dsn" --project="${{ env.PROJECT_ID }}")
          $(go env GOPATH)/bin/goose postgres "${PG_URI}" -dir ./database/migration/postgres up

      - name: Resolve image reference
        id: image
        run: |
          set -euo pipefail

          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="${{ inputs.image_tag }}"
          IMAGE_DIGEST=""
          TAG_SOURCE="manual override"
          TARGET_IMAGE_BASE="${{ env.REGISTRY }}/${OWNER}/${{ inputs.target }}"

          if [ -z "${IMAGE_TAG}" ]; then
            TAG_SOURCE="latest built commit on selected ref"

            while read -r COMMIT_SHA; do
              CANDIDATE_TAG="$(git rev-parse --short "${COMMIT_SHA}")"
              CANDIDATE_IMAGE="${TARGET_IMAGE_BASE}:${CANDIDATE_TAG}"

              if IMAGE_DIGEST=$(gcloud artifacts docker images describe "${CANDIDATE_IMAGE}" \
                --project="${{ env.PROJECT_ID }}" \
                --format='value(image_summary.fully_qualified_digest)' 2>/dev/null); then
                IMAGE_TAG="${CANDIDATE_TAG}"
                break
              fi
            done < <(git rev-list --max-count=50 HEAD)
          else
            IMAGE_DIGEST=$(gcloud artifacts docker images describe "${TARGET_IMAGE_BASE}:${IMAGE_TAG}" \
              --project="${{ env.PROJECT_ID }}" \
              --format='value(image_summary.fully_qualified_digest)')
          fi

          if [ -z "${IMAGE_TAG}" ]; then
            echo "::error::No deployable image tag found for the selected ref. Build and push the image first, or provide image_tag manually."
            exit 1
          fi

          IMAGE_NAME="${TARGET_IMAGE_BASE}:${IMAGE_TAG}"

          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "digest=${IMAGE_DIGEST}" >> $GITHUB_OUTPUT
          echo "source=${TAG_SOURCE}" >> $GITHUB_OUTPUT

          echo "Deploy target: ${{ inputs.target }}"
          echo "Selected ref: ${GITHUB_REF_NAME}"
          echo "Resolved image tag: ${IMAGE_TAG} (${TAG_SOURCE})"
          echo "Resolved image: ${IMAGE_NAME}"
          echo "Resolved digest: ${IMAGE_DIGEST}"

      - name: Verify image exists in Artifact Registry
        run: |
          gcloud artifacts docker images describe "${{ steps.image.outputs.name }}" \
            --project="${{ env.PROJECT_ID }}" \
            --format='value(image_summary.fully_qualified_digest)'

      - name: Prepare service YAML
        run: |
          set -euo pipefail

          if [ "${{ inputs.target }}" = "radar" ] && [ -z "${{ secrets.CLOUDFLARE_ORIGIN_SECRET }}" ]; then
            echo "::error::Missing required GitHub secret: CLOUDFLARE_ORIGIN_SECRET"
            exit 1
          fi

          # Build final YAML using kubectl's built-in kustomize
          kubectl kustomize deploy/cloud-run/overlays/${{ inputs.target }} > /tmp/service.yaml
          # Replace image placeholder
          sed -i "s|IMAGE_PLACEHOLDER|${{ steps.image.outputs.name }}|g" /tmp/service.yaml
          # Replace service account placeholder
          sed -i "s|SERVICE_ACCOUNT_PLACEHOLDER|${{ secrets.GCP_SA_EMAIL }}|g" /tmp/service.yaml
          # Replace Cloudflare origin secret placeholder from GitHub Secret
          CLOUDFLARE_SECRET_ESCAPED=$(printf '%s' "${{ secrets.CLOUDFLARE_ORIGIN_SECRET }}" | sed -e 's/[\\/&]/\\&/g')
          sed -i "s|HTTP_CLOUDFLARESECRET_PLACEHOLDER|${CLOUDFLARE_SECRET_ESCAPED}|g" /tmp/service.yaml
      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run services replace /tmp/service.yaml \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }}

          # radar should allow unauthenticated access
          if [ "${{ inputs.target }}" = "radar" ]; then
            gcloud run services add-iam-policy-binding ${{ inputs.target }} \
              --project=${{ env.PROJECT_ID }} \
              --region=${{ env.REGION }} \
              --member="allUsers" \
              --role="roles/run.invoker"
          fi

      - name: Sync Cloudflare Transform Rule Header
        if: ${{ inputs.target == 'radar' }}
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_RULE_ID: ${{ secrets.CLOUDFLARE_TRANSFORM_RULE_ID }}
          CF_ORIGIN_SECRET: ${{ secrets.CLOUDFLARE_ORIGIN_SECRET }}
          CF_SECRET_HEADER_NAME: X-Cloudflare-Secret
        run: |
          set -euo pipefail

          for required in CF_API_TOKEN CF_ZONE_ID CF_RULE_ID CF_ORIGIN_SECRET; do
            if [ -z "${!required}" ]; then
              echo "::error::Missing required GitHub secret: ${required}"
              exit 1
            fi
          done

          ENTRYPOINT_RESPONSE=$(curl --silent --show-error --fail \
            --request GET \
            --url "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/rulesets/phases/http_request_late_transform/entrypoint" \
            --header "Authorization: Bearer ${CF_API_TOKEN}" \
            --header "Content-Type: application/json")

          if [ "$(printf '%s' "${ENTRYPOINT_RESPONSE}" | jq -r '.success')" != "true" ]; then
            echo "::error::Failed to fetch Cloudflare transform ruleset entrypoint"
            printf '%s' "${ENTRYPOINT_RESPONSE}" | jq -c '.errors'
            exit 1
          fi

          RULESET_ID=$(printf '%s' "${ENTRYPOINT_RESPONSE}" | jq -r '.result.id // empty')
          if [ -z "${RULESET_ID}" ]; then
            echo "::error::Cloudflare transform ruleset entrypoint id not found"
            exit 1
          fi

          TARGET_RULE=$(printf '%s' "${ENTRYPOINT_RESPONSE}" | jq -c --arg rule_id "${CF_RULE_ID}" '.result.rules[] | select(.id == $rule_id)')
          if [ -z "${TARGET_RULE}" ]; then
            echo "::error::Cloudflare transform rule not found: ${CF_RULE_ID}"
            exit 1
          fi

          UPDATED_RULE=$(printf '%s' "${TARGET_RULE}" | jq -c --arg header "${CF_SECRET_HEADER_NAME}" --arg secret "${CF_ORIGIN_SECRET}" '
            .action = "rewrite"
            | .action_parameters.headers[$header] = {"operation":"set","value":$secret}
          ')

          UPDATE_RESPONSE=$(curl --silent --show-error --fail \
            --request PATCH \
            --url "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/rulesets/${RULESET_ID}/rules/${CF_RULE_ID}" \
            --header "Authorization: Bearer ${CF_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "${UPDATED_RULE}")

          if [ "$(printf '%s' "${UPDATE_RESPONSE}" | jq -r '.success')" != "true" ]; then
            echo "::error::Failed to update Cloudflare transform rule header"
            printf '%s' "${UPDATE_RESPONSE}" | jq -c '.errors'
            exit 1
          fi

      - name: Show Output
        run: |
          gcloud run services describe ${{ inputs.target }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)'
