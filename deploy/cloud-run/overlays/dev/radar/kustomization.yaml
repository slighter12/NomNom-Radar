apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../shared/radar

patches:
  - target:
      kind: Service
      name: radar
    patch: |-
      - op: replace
        path: /metadata/annotations/run.googleapis.com~1ingress
        value: internal
      - op: add
        path: /metadata/annotations/run.googleapis.com~1invoker-iam-disabled
        value: "false"
