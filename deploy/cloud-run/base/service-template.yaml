apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: service
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: SERVICE_ACCOUNT_PLACEHOLDER
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: IMAGE_PLACEHOLDER
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          ports:
            - name: h2c
              containerPort: 8080
          resources:
            limits:
              memory: 256Mi
              cpu: "1"
          volumeMounts:
            - name: firebase-service-account
              mountPath: /secrets/firebase
              readOnly: true
          env:
            # Force app server port to match Cloud Run container port.
            - name: HTTP_PORT
              value: "8080"
            - name: HTTP_MAXREQUESTBODYSIZE
              value: "100KB"
            - name: HTTP_ALLOWEDHOST
              value: "api.whereisvendor.com"
            - name: HTTP_CLOUDFLARESECRET
              value: "HTTP_CLOUDFLARESECRET_PLACEHOLDER"
            # Cloud Run should emit structured JSON logs for queryability.
            - name: ENV_LOG_PRETTY
              value: "false"
            - name: ENV_LOG_LEVEL
              value: "info"

            # ========== Postgres Configuration ==========
            # Preset for transaction pooler (Supabase/pgBouncer)
            - name: POSTGRES_PRESET
              value: "supabase_transaction"
            # Master connection (single DSN secret to reduce Secret Manager footprint)
            - name: POSTGRES_MASTER_DSN
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: postgres-master-dsn
            # SSL settings (Supabase requires "require" or "verify-full")
            - name: POSTGRES_SSLMODE
              value: "require"
            - name: POSTGRES_MAXOPENCONNS
              value: "25"

            # ========== Auth Configuration ==========
            - name: AUTH_MAXACTIVESESSIONS
              value: "10"
            - name: SECRETKEY_ACCESS
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: secretkey-access
            - name: SECRETKEY_REFRESH
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: secretkey-refresh

            # ========== Firebase Configuration ==========
            - name: FIREBASE_PROJECTID
              value: radar-469510
            - name: FIREBASE_CREDENTIALSPATH
              value: /secrets/firebase/service-account.json

            # ========== PubSub Configuration ==========
            - name: PUBSUB_PROVIDER
              value: "google"
            - name: PUBSUB_PROJECTID
              value: radar-469510
            - name: PUBSUB_TOPICID
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: pubsub-topicid

            # ========== PMTiles Configuration ==========
            - name: PMTILES_SOURCE
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: pmtiles-source
            - name: PMTILES_ENABLED
              value: "true"
      volumes:
        - name: firebase-service-account
          secret:
            secretName: firebase-service-account
            items:
              - key: latest
                path: service-account.json
